<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Commander - Joe Délices</title>
  <link rel="stylesheet" href="style.css">
  <!-- EmailJS v3 (version stable) -->
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
  <script>
    (function(){
      emailjs.init("jdnNQ6cSdS1p72_Pe");
    })();
  </script>
</head>
<body>
  <header>
    <div class="logo">
      <img src="images/joe-logo.png" alt="Logo Joe Délices">
      <h1>Joe Délices</h1>
    </div>
    <nav>
      <a href="index.html">Accueil</a>
      <a href="menu.html">Menu</a>
      <a href="commander.html" class="active">Commander</a>
      <a href="contact.html">Contact</a>
    </nav>
  </header>

  <section class="commande-form">
    <h2>Passer une commande</h2>
    <p>Remplis le formulaire ci-dessous. On s'occupe du reste !</p>

    <form id="commandeForm">
      <label for="nom">Nom ou pseudo</label>
      <input type="text" id="nom" name="nom" placeholder="Ex: Koffi Agbessi" required>

      <label for="telephone">Téléphone</label>
      <input type="tel" id="telephone" name="telephone" placeholder="+228 XX XX XX XX" required>

      <label for="plat">Choisis ton plat</label>
      <select id="plat" name="plat" required>
        <option value="">-- Sélectionne un plat --</option>
        <option value="Riz Cantonais — 2 000 FCFA">Riz Cantonais — 2 000 FCFA</option>
      </select>

      <label for="quantite">Nombre de plats</label>
      <input type="number" id="quantite" name="quantite" min="1" value="1" required>

      <label for="adresse">Adresse de livraison</label>
      <textarea id="adresse" name="adresse" rows="3" placeholder="Quartier, rue, point de repère..." required></textarea>

      <label for="jour">Jour de livraison</label>
      <select id="jour" name="jour" required>
        <option value="Mardi">Mardi</option>
        <option value="Vendredi">Vendredi</option>
      </select>

      <button type="submit" class="btn" id="btnCommander">🛒 Commander</button>
    </form>

    <p id="resultat"></p>
  </section>

  <footer>
    <p>&copy; 2025 Joe Délices — Lomé, Togo · Tous droits réservés</p>
  </footer>

  <script>
    document.getElementById("commandeForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const btn = document.getElementById("btnCommander");
      const resultat = document.getElementById("resultat");

      btn.disabled = true;
      btn.textContent = "⏳ Envoi en cours...";
      resultat.innerHTML = "";

      const params = {
        nom: document.getElementById("nom").value,
        telephone: document.getElementById("telephone").value,
        plat: document.getElementById("plat").value,
        quantite: document.getElementById("quantite").value,
        adresse: document.getElementById("adresse").value,
        jour: document.getElementById("jour").value
      };

      emailjs.send("service_starone", "template_starone", params)
        .then(function() {
          resultat.innerHTML = "✅ Commande envoyée avec succès ! On vous contacte bientôt.";
          resultat.style.color = "green";
          document.getElementById("commandeForm").reset();
        })
        .catch(function(error) {
          console.error("Erreur EmailJS :", error);
          resultat.innerHTML = "❌ Erreur lors de l'envoi. Essayez via WhatsApp au <a href='https://wa.me/22870020470' target='_blank'>+228 70 02 04 70</a>.";
          resultat.style.color = "#c0392b";
        })
        .finally(function() {
          btn.disabled = false;
          btn.textContent = "🛒 Commander";
        });
    });
  </script>
</body>
</html>
